syntax = "proto3";

option go_package = "./gen;user_pb";

import "user_requests.proto";
import "user_responses.proto";

service UserService {
    rpc Create (UserProfile) returns (UserProfile);
    rpc Read (IdRequest) returns (UserProfile);
    rpc ReadMultiple (ReadMultipleRequest) returns (ReadMultipleResponse);
    rpc Update (UserProfile) returns (UserProfile);
    rpc Delete (IdRequest) returns (UserProfile);
}

message UserProfile {
    int32 user_id = 1;
    int32 main_photo_id = 2;
    string name = 3;
    string about = 4;
}